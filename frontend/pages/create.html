<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Reservation</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <nav class="nav">
    <div class="nav-brand">MeetingRoom</div>
    <div class="nav-links">
      <a href="../index.html">Home</a>
      <a href="calendar.html">Calendar</a>
      <a href="create.html">Create</a>
      <a href="cancel.html">Cancel</a>
    </div>
  </nav>

  <div class="page-header">
    <div class="container">
      <h1>Create Reservation</h1>
      <p>Fill in the details to book a meeting room</p>
    </div>
  </div>

  <div class="container">
    <div class="form-card">

      <div class="form-group">
        <label for="room">Room</label>
        <select id="room">
          <option value="">-- Select a room --</option>
          <option value="Room A">Room A — Capacity: 10</option>
          <option value="Room B">Room B — Capacity: 20</option>
          <option value="Room C">Room C — Capacity: 5</option>
        </select>
      </div>

      <div class="form-group">
        <label for="name">Your Name</label>
        <input type="text" id="name" placeholder="e.g. John Doe">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date">
        </div>
        <div class="form-group">
          <label for="attendees">Attendees</label>
          <input type="number" id="attendees" min="1" placeholder="e.g. 8">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="start-time">Start Time</label>
          <input type="time" id="start-time">
        </div>
        <div class="form-group">
          <label for="end-time">End Time</label>
          <input type="time" id="end-time">
        </div>
      </div>

      <div class="error-message" id="error-message"></div>
      <div class="success-message" id="success-message"></div>

      <button id="submit-btn" class="btn full-width">Reserve Room</button>

    </div>
  </div>

  <footer class="footer">
    <p>
        Developed by Okafor Ifunanya and Ekwem Chidumaga
    </p>
    <p>© 2026 Meeting Room Reservation System. All rights reserved.</p>
  </footer>

  <script src="../app.js"></script>
</body>
</html>
